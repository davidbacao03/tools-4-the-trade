<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Adicionar ferramenta">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Ferramenta - Tools 4 The Trade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">

        <aside class="sidebar">
            <h2 class="logo">Tools 4 The Trade</h2>
            <nav class="menu">
                <a href="index.html">Home</a>
                <a href="ferramentas.html">Ferramentas</a>
                <a href="dashboard.html">Dashboard</a>
            </nav>
        </aside>

        <div class="content">
            <header class="topbar">
                <div class="search-box">
                    <input type="text" placeholder="Pesquisar ferramenta...">
                </div>
                <div class="profile-circle"></div>
            </header>

            <main class="main-area">
                <section class="form-section">
                    <h1>Adicionar Ferramenta</h1>

                    <form class="tool-form">
                        <label for="name">Nome da ferramenta</label>
                        <input type="text" id="name" name="name">

                        <label for="category">Categoria</label>
                        <input type="text" id="category" name="category">

                        <label for="price">Preço por dia</label>
                        <input type="number" id="price" name="price">

                        <label for="location">Localização</label>
                        <input type="text" id="location" name="location">

                        <label for="description">Descrição</label>
                        <textarea id="description" name="description"></textarea>

                        <button type="submit">Guardar</button>
                    </form>
                </section>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
